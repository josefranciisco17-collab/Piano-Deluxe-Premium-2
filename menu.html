<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Menu Piano Deluxe</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#0d0d0d,#181818,#111);
font-family:Segoe UI;
color:white;
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:
0 15px 40px rgba(0,0,0,.55);
border:1px solid rgba(255,255,255,.08);
}

h1{
margin-bottom:25px;
font-size:28px;
}

button{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:15px;
background:#1f1f1f;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.03);
background:#2a2a2a;
}
</style>
</head>
<body>

<div class="card">
<h1>🎹 Piano Deluxe</h1>

<button onclick="location.href='index.html'">
Entrar al Piano
</button>

<button onclick="location.href='admin.html'">
Panel Admin
</button>

<button id="logoutBtn">
Cerrar sesión
</button>
</div>

<script type="module">
import { auth } from "./firebase-config.js";
import {
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

document.getElementById("logoutBtn").onclick=async()=>{
await signOut(auth);
location.href="login.html";
}
</script>

</body>
</html>
