<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Piano Deluxe</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
padding:25px;
border-radius:35px;
background:linear-gradient(145deg,#111,#1d1d1d);
box-shadow:0 0 30px rgba(255,255,255,.08);
text-align:center;
}

.profile-pic{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
margin-bottom:20px;
}

button{
width:80%;
padding:14px;
margin:8px 0;
border:none;
border-radius:18px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.white-btn{
background:white;
color:black;
}

.dark-btn{
background:#111;
color:white;
}

input{
width:70%;
padding:12px;
margin:8px 0;
border:none;
border-radius:14px;
background:#111;
color:white;
font-size:18px;
text-align:center;
}

.email{
margin:18px 0;
font-size:18px;
color:#ddd;
}

.stats{
width:80%;
padding:15px;
margin:15px auto;
border-radius:16px;
background:rgba(255,255,255,0.08);
font-size:18px;
line-height:1.5;
}

.brand{
margin-top:20px;
font-size:15px;
color:#bdbdbd;
}
</style>
</head>
<body>

<div class="container">

<img id="profilePic" class="profile-pic" src="" alt="Foto">

<br>

<input type="file" id="profileInput" hidden>

<button class="white-btn" onclick="document.getElementById('profileInput').click()">
Editar foto
</button>

<button class="white-btn" id="savePhotoBtn">
Guardar foto
</button>

<input type="text" id="displayName" placeholder="Tu nombre">

<button class="white-btn" id="saveNameBtn">
Guardar nombre
</button>

<div class="email" id="userEmail"></div>

<div class="stats">
🏆 Rango: Principiante <br>
🎯 Récord: 0
</div>

<button class="white-btn" onclick="location.href='index.html'">
Entrar al Piano
</button>

<button class="dark-btn" onclick="openAdmin()">
Panel Admin
</button>

<button class="white-btn" id="midiSectionBtn">
🎵 Música MIDI
</button>

<div id="midiPanel" style="display:none; padding:20px;">

<h2>Biblioteca MIDI</h2>

<input type="file" id="uploadMidiInput" accept=".mid,.midi">

<button id="uploadMidiBtn">Subir MIDI</button>
<button id="refreshMidiBtn">Actualizar MIDIs</button>

<table id="midiTable" border="1" width="100%">
<thead>
<tr>
<th>Nombre</th>
<th>Usuario</th>
<th>Fecha</th>
<th>Acciones</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<button class="dark-btn" id="logoutBtn">
Cerrar sesión
</button>

<div class="brand">
Desarrollado por JFAM & Co. Piano Studios.
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signOut,
updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
addDoc,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyArKUqthRHDrO1xXn39wJP-JCiBZdilOcY",
authDomain: "piano-deluxe-premium.firebaseapp.com",
projectId: "piano-deluxe-premium",
storageBucket: "piano-deluxe-premium.firebasestorage.app",
messagingSenderId: "79307845171",
appId: "1:79307845171:web:c21918694f6d916fbbfd46"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const profilePic = document.getElementById("profilePic");
const profileInput = document.getElementById("profileInput");
const userEmail = document.getElementById("userEmail");
const displayName = document.getElementById("displayName");
let selectedFile = null;
const midiSectionBtn = document.getElementById("midiSectionBtn");
const midiPanel = document.getElementById("midiPanel");

onAuthStateChanged(auth, async(user)=>{

if(!user){
location.href="login.html";
return;
}

userEmail.textContent = user.email;

const userDoc = await getDoc(doc(db,"users",user.uid));

if(userDoc.exists()){
const data = userDoc.data();

if(data.customPhoto){
profilePic.src = data.customPhoto;
}

if(data.customName){
displayName.value = data.customName;
}else{
displayName.value = user.displayName || "";
}
}else{
profilePic.src = user.photoURL || "";
displayName.value = user.displayName || "";
}

});

profileInput.addEventListener("change",(e)=>{
selectedFile = e.target.files[0];

if(selectedFile){
profilePic.src = URL.createObjectURL(selectedFile);
}
});

document.getElementById("savePhotoBtn").onclick = async()=>{

const user = auth.currentUser;

if(!selectedFile || !user){
alert("Selecciona una foto primero");
return;
}

const storageRef = ref(
storage,
"profile_pictures/"+user.uid
);

await uploadBytes(storageRef,selectedFile);

const photoURL =
await getDownloadURL(storageRef);

await updateProfile(user,{
photoURL:photoURL
});

await setDoc(
doc(db,"users",user.uid),
{
customPhoto:photoURL
},
{merge:true}
);

alert("Foto guardada correctamente 📸");
};

document.getElementById("saveNameBtn").onclick = async()=>{

const user = auth.currentUser;
const newName = displayName.value.trim();

if(!newName){
alert("Ingresa un nombre");
return;
}

await updateProfile(user,{
displayName:newName
});

await setDoc(
doc(db,"users",user.uid),
{
customName:newName
},
{merge:true}
);

alert("Nombre guardado correctamente ✍️");
};

document.getElementById("logoutBtn")
.onclick = async()=>{

await signOut(auth);

location.href="login.html";

};
window.openAdmin = function(){

const defaultPass = "Flor 7272";
const savedPass =
localStorage.getItem("adminPassword") || defaultPass;

const pass = prompt("Ingrese contraseña Admin:");

if(pass === savedPass){
location.href = "admin.html";
}else{
alert("Contraseña incorrecta");
}

};

const midiSectionBtn = document.getElementById("midiSectionBtn");
const midiPanel = document.getElementById("midiPanel");
const uploadMidiInput = document.getElementById("uploadMidiInput");
const uploadMidiBtn = document.getElementById("uploadMidiBtn");
const refreshMidiBtn = document.getElementById("refreshMidiBtn");
const midiTableBody = document.querySelector("#midiTable tbody");

let currentMidi = null;
let midiPaused = false;

midiSectionBtn.onclick = () => {
if(midiPanel.style.display === "none"){
midiPanel.style.display = "block";
}else{
midiPanel.style.display = "none";
}
};

uploadMidiBtn.onclick = async () => {
const user = auth.currentUser;
const file = uploadMidiInput.files[0];

if(!file){
alert("Selecciona un archivo MIDI");
return;
}

const q = query(
collection(db,"midis"),
where("fileName","==",file.name)
);

const existing = await getDocs(q);

if(!existing.empty){
alert("Ese MIDI ya existe");
return;
}

const userMidis = query(
collection(db,"midis"),
where("userId","==",user.uid)
);

const userFiles = await getDocs(userMidis);

if(userFiles.size >= 15){
alert("Máximo 15 MIDIs por usuario");
return;
}

const fileRef = ref(storage, "midi_files/" + file.name);

await uploadBytes(fileRef, file);

const url = await getDownloadURL(fileRef);

await addDoc(collection(db,"midis"),{
fileName: file.name,
url: url,
userId: user.uid,
uploadedAt: new Date()
});

alert("MIDI subido correctamente 🎹");
uploadMidiInput.value = "";
};


refreshMidiBtn.onclick = async () => {
midiTableBody.innerHTML = "";

const snapshot = await getDocs(collection(db,"midis"));

snapshot.forEach((docSnap) => {
const midi = docSnap.data();

const row = document.createElement("tr");


row.innerHTML = `
<td>${midi.fileName}</td>
<td>${midi.userId}</td>
<td>${new Date(midi.uploadedAt.seconds * 1000).toLocaleString()}</td>
<td>
<button onclick="window.open('${midi.url}','_blank')">Descargar</button>
</td>
`;

midiTableBody.appendChild(row);
});
};

</script>

</body>
</html>
