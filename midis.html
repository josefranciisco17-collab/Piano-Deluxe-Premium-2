<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca MIDI Global</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Biblioteca MIDI Global</h1>

<input type="file" id="midiFile" accept=".mid,.midi">
<input type="text" id="midiName" placeholder="Nombre del MIDI">

<button id="uploadBtn">Subir MIDI</button>
<button onclick="window.location.href='menu.html'">← Volver</button>

<h2>Biblioteca</h2>
<div id="midiList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyArKUqthRHDrO1xXn39wJP-JCiBZdilOcY",
authDomain: "piano-deluxe-premium.firebaseapp.com",
projectId: "piano-deluxe-premium",
storageBucket: "piano-deluxe-premium.firebasestorage.app",
messagingSenderId: "79307845171",
appId: "1:79307845171:web:c21918694f6d916fbbfd46"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const midiFile = document.getElementById("midiFile");
const midiName = document.getElementById("midiName");
const uploadBtn = document.getElementById("uploadBtn");
const midiList = document.getElementById("midiList");

async function loadMidis() {
midiList.innerHTML = "";

const snapshot = await getDocs(collection(db, "midis"));

snapshot.forEach((docSnap) => {
const data = docSnap.data();

const item = document.createElement("div");
item.className = "midi-item";

item.innerHTML = &lt;p&gt;${data.name}</p>
<a href="${data.url}" target="_blank"&gt;Ver archivo&lt;/a&gt;;

midiList.appendChild(item);
});
}

uploadBtn.addEventListener("click", async () => {
try {
const file = midiFile.files[0];
const name = midiName.value.trim();

if (!file) {
alert("Selecciona un archivo MIDI");
return;
}

if (!name) {
alert("Escribe un nombre");
return;
}

const duplicateQuery = query(
collection(db, "midis"),
where("filename", "==", file.name)
);

const duplicateSnap = await getDocs(duplicateQuery);

if (!duplicateSnap.empty) {
alert("Ese MIDI ya existe");
return;
}

const storageRef = ref(storage, "midis/" + file.name);

await uploadBytes(storageRef, file);

const downloadURL = await getDownloadURL(storageRef);

await addDoc(collection(db, "midis"), {
name,
filename: file.name,
url: downloadURL,
createdAt: Date.now()
});

alert("MIDI subido con éxito");

midiFile.value = "";
midiName.value = "";

loadMidis();

} catch (error) {
console.error(error);
alert("Error: " + error.message);
}
});

loadMidis();
</script>

</body>
</html>
