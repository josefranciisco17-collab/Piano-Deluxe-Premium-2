<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis MIDIs</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Mis Canciones MIDIs</h1>

<input type="file" id="midiFile" accept=".mid,.midi">
<input type="text" id="midiName" placeholder="Nombre del MIDI">

<button onclick="guardarMidi()">Guardar MIDI</button>
<button onclick="window.location.href='menu.html'">← Volver</button>

<h2>Biblioteca</h2>
<div id="biblioteca"></div>
</div>

<script>
function guardarMidi() {
const fileInput = document.getElementById("midiFile");
const nameInput = document.getElementById("midiName");

if (!fileInput.files.length) {
alert("Selecciona un archivo MIDI");
return;
}

const file = fileInput.files[0];
const nombre = nameInput.value.trim() || file.name;

const reader = new FileReader();

reader.onload = function(e) {
let midis = JSON.parse(localStorage.getItem("midis")) || [];

midis.push({
nombre: nombre,
data: e.target.result
});

localStorage.setItem("midis", JSON.stringify(midis));

alert("MIDI guardado correctamente");

fileInput.value = "";
nameInput.value = "";

cargarBiblioteca();
};

reader.readAsDataURL(file);
}

function cargarBiblioteca() {
const biblioteca = document.getElementById("biblioteca");
const midis = JSON.parse(localStorage.getItem("midis")) || [];

biblioteca.innerHTML = "";

if (midis.length === 0) {
biblioteca.innerHTML = "<p>No hay MIDIs guardados.</p>";
return;
}

midis.forEach((midi, index) => {
const item = document.createElement("div");
item.className = "midi-item";

item.innerHTML = &lt;p&gt;${midi.nombre}</p>
<button onclick="seleccionarMidi(${index})"&gt;Usar&lt;/button&gt; &lt;button onclick="eliminarMidi(${index})"&gt;Eliminar&lt;/button&gt;;

biblioteca.appendChild(item);
});
}

function seleccionarMidi(index) {
const midis = JSON.parse(localStorage.getItem("midis")) || [];
localStorage.setItem("midiSeleccionado", JSON.stringify(midis[index]));
alert("MIDI seleccionado");
}

function eliminarMidi(index) {
let midis = JSON.parse(localStorage.getItem("midis")) || [];
midis.splice(index, 1);
localStorage.setItem("midis", JSON.stringify(midis));
cargarBiblioteca();
}

cargarBiblioteca();
</script>

</body>
</html>
