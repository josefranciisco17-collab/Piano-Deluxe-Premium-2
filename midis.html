<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca MIDI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Biblioteca MIDI Global</h1>

<input type="file" id="midiFile" accept=".mid,.midi">
<input type="text" id="midiName" placeholder="Nombre del MIDI">

<button id="uploadBtn">Subir MIDI</button>

<div id="biblioteca"></div>

<button onclick="location.href='menu.html'">
← Volver
</button>

</div>

<script type="module">

import { db, storage } from "./firebase-config.js";

import {
collection,
getDocs,
addDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

import {
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

async function generarHash(file) {
const buffer = await file.arrayBuffer();
const hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
const hashArray = Array.from(new Uint8Array(hashBuffer));

return hashArray.map(b =>
b.toString(16).padStart(2, "0")
).join("");
}

async function subirMidi() {
const file = document.getElementById("midiFile").files[0];
const name = document.getElementById("midiName").value.trim();

if (!file || !name) {
alert("Selecciona un MIDI y pon nombre");
return;
}

const hash = await generarHash(file);

const q = query(
collection(db, "midis"),
where("hash", "==", hash)
);

const existing = await getDocs(q);

if (!existing.empty) {
alert("Este MIDI ya existe en la biblioteca");
return;
}

const storageRef = ref(storage, midis/${hash}.mid`);

await uploadBytes(storageRef, file);

const url = await getDownloadURL(storageRef);

await addDoc(collection(db, "midis"), {
nombre: name,
hash: hash,
url: url,
fecha: Date.now()
});

alert("MIDI subido correctamente");

cargarBiblioteca();
}

async function cargarBiblioteca() {
const biblioteca = document.getElementById("biblioteca");
biblioteca.innerHTML = "";

const snapshot = await getDocs(collection(db, "midis"));

snapshot.forEach(doc => {
const midi = doc.data();

biblioteca.innerHTML += &lt;div class="midi-item"&gt; &lt;p&gt;${midi.nombre}</p>
<button onclick="usarMidi('${midi.url}')">
Usar
</button>
</div>
`;
});
}

window.usarMidi = function(url) {
localStorage.setItem("midiSeleccionado", url);
alert("MIDI seleccionado");
};

document.getElementById("uploadBtn").onclick = subirMidi;

cargarBiblioteca();

</script>

</body>
</html>
