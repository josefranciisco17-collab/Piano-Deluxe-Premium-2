<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis MIDIs</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Mis Canciones MIDIs</h1>

<input type="file" id="midiFile" accept=".mid,.midi">
<input type="text" id="midiName" placeholder="Nombre del MIDI">

<button onclick="subirMIDI()">Guardar MIDI</button>
<button onclick="window.location.href='menu.html'">← Volver</button>

<h2>Biblioteca</h2>
<div id="listaMidis"></div>
</div>

<script type="module">
import { db, storage } from "./firebase-config.js";
import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

window.subirMIDI = async function() {
const file = document.getElementById("midiFile").files[0];
const name = document.getElementById("midiName").value;

if (!file || !name) {
alert("Selecciona un archivo MIDI y escribe un nombre");
return;
}

const storageRef = ref(storage, "midis/" + file.name);

await uploadBytes(storageRef, file);

const url = await getDownloadURL(storageRef);

await addDoc(collection(db, "midis"), {
nombre: name,
url: url
});

alert("MIDI guardado correctamente");
cargarMidis();
};

async function cargarMidis() {
const lista = document.getElementById("listaMidis");
lista.innerHTML = "";

const snapshot = await getDocs(collection(db, "midis"));

snapshot.forEach(doc => {
const midi = doc.data();

lista.innerHTML += &lt;div class="midi-item"&gt; ${midi.nombre} &lt;/div&gt;;
});
}

cargarMidis();
</script>

</body>
</html>
