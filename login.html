<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Piano Deluxe</title>
<style>
body{
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}
button{
padding:15px 30px;
margin:10px;
border:none;
border-radius:15px;
background:#222;
color:white;
font-size:18px;
}
</style>
</head>
<body>

<h1>Piano Deluxe Login</h1>

<button id="googleLogin">Entrar con Google</button>

<script type="module">
import {
auth,
provider
} from "./firebase-config.js";

import {
signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

document.getElementById("googleLogin").onclick=async()=>{
await signInWithPopup(auth,provider);
location.href="menu.html";
};
</script>

</body>
</html>
