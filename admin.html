
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}
.container{
max-width:500px;
margin:auto;
}
.section{
background:#111;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}
h1,h2{
text-align:center;
}
button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:14px;
font-weight:bold;
cursor:pointer;
}
.white-btn{
background:white;
color:black;
}
.red-btn{
background:red;
color:white;
}
input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:14px;
background:#222;
color:white;
}
</style>
</head>
<body>

<div class="container">

<h1>👑 Panel Admin</h1>

<div class="section">
<h2>🔐 Seguridad</h2>
<input type="password" id="newPass" placeholder="Nueva contraseña">
<button class="white-btn" onclick="changePassword()">Cambiar contraseña</button>
<button class="red-btn" onclick="restorePassword()">Restablecer Flor 7272</button>
</div>

<div class="section">
<h2>🎵 Song Manager</h2>
<button class="white-btn" onclick="alert('Agregar canción')">Agregar canción</button>
<button class="white-btn" onclick="alert('Eliminar canción')">Eliminar canción</button>
<button class="white-btn" onclick="alert('Importar MIDI')">Importar MIDI</button>
<button class="white-btn" onclick="alert('Editar dificultad')">Editar dificultad</button>
</div>

<div class="section">
<h2>👤 Player Control</h2>
<button class="white-btn" onclick="viewPlayers()">Ver jugadores</button>
<button class="white-btn" onclick="alert('Editar rango')">Editar rango</button>
<button class="white-btn" onclick="alert('Banear jugador')">Banear jugador</button>
<button class="white-btn" onclick="alert('Resetear progreso')">Resetear progreso</button>
</div>

<div class="section">
<h2>💾 Database Control</h2>
<button class="white-btn" onclick="alert('Backup total')">Backup total</button>
<button class="white-btn" onclick="alert('Restaurar backup')">Restaurar backup</button>
<button class="white-btn" onclick="alert('Exportar datos')">Exportar datos</button>
<button class="white-btn" onclick="alert('Sync manual')">Sync manual</button>
</div>

<div class="section">
<h2>📊 Analytics</h2>
<button class="white-btn" onclick="alert('Jugadores activos')">Jugadores activos</button>
<button class="white-btn" onclick="alert('Canción más jugada')">Canción más jugada</button>
<button class="white-btn" onclick="alert('Récord global')">Récord global</button>
<button class="white-btn" onclick="alert('Precisión promedio')">Precisión promedio</button>
</div>

<button class="white-btn" onclick="location.href='menu.html'">Volver</button>

</div>

<script>
function viewPlayers(){
alert("Botón funcionando");
}

function changePassword(){
const newPass = document.getElementById("newPass").value.trim();

if(!newPass){
alert("Ingresa una contraseña");
return;
}

localStorage.setItem("adminPassword", newPass);
alert("Contraseña actualizada");
}

function restorePassword(){
localStorage.removeItem("adminPassword");
alert("Contraseña restaurada a Flor 7272");
}
</script>
</body>
</html>
