<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Deluxe Premium</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
</head>
<body>

<h1>Piano Deluxe Premium</h1>

<div id="piano"></div>

<h2>Biblioteca MIDI</h2>
<div id="listaMidis"></div>

<button onclick="window.location.href='menu.html'">← Volver</button>

<script type="module">
import { db } from "./firebase-config.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const audioFolder = "audio/";

function playSound(note) {
const audio = new Audio(audioFolder + note + ".mp3");
audio.play();
}

window.playSound = playSound;

async function cargarMidis() {
const lista = document.getElementById("listaMidis");
lista.innerHTML = "";

const snapshot = await getDocs(collection(db, "midis"));

snapshot.forEach(doc => {
const midi = doc.data();

lista.innerHTML += &lt;button onclick="reproducirMidi('${midi.url}')">
▶ ${midi.nombre} &lt;/button&gt;;
});
}

window.reproducirMidi = async function(url) {
const response = await fetch(url);
const arrayBuffer = await response.arrayBuffer();

const midi = new Midi(arrayBuffer);

midi.tracks.forEach(track => {
track.notes.forEach(note => {
setTimeout(() => {
playSound(note.name);
}, note.time * 1000);
});
});
};

cargarMidis();
</script>

</body>
</html>
