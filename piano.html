<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Deluxe Premium</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
</head>
<body>

<div class="controls">
<button id="sustainBtn">Sustain OFF</button>
<button id="scrollBtn">🔒 Scroll</button>

<label>Seleccionar MIDI</label>
<input type="file" id="midiFile" accept=".mid,.midi">

<button id="playBtn">▶ Reproducir</button>
<button id="pauseBtn">⏸ Pausar</button>
<button id="resumeBtn">⏩ Continuar</button>

<button onclick="location.href='menu.html'">← Volver</button>
</div>

<div class="info">
Desarrollado por JFAM & Co. Piano Studio
</div>

<div id="keyboard"></div>

<script>
const midiInput = document.getElementById("midiFile");

midiInput.addEventListener("change", async (e) => {
const file = e.target.files[0];
if (!file) return;

const arrayBuffer = await file.arrayBuffer();
const midi = new Midi(arrayBuffer);

console.log("MIDI cargado:", midi);
});

document.getElementById("playBtn").onclick = () => {
alert("Reproduciendo MIDI");
};

document.getElementById("pauseBtn").onclick = () => {
alert("Pausado");
};

document.getElementById("resumeBtn").onclick = () => {
alert("Continuando");
};
</script>

</body>
</html>
