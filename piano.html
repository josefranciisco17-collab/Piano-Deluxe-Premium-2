<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Piano Deluxe Premium</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

#controls{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999;
display:flex;
flex-direction:column;
gap:10px;
align-items:center;
}

button, select{
padding:15px 20px;
border:none;
border-radius:15px;
font-size:20px;
}

#keyboard{
display:flex;
height:100vh;
align-items:flex-end;
overflow-x:auto;
}

.key{
width:70px;
height:320px;
background:white;
border:1px solid black;
position:relative;
}

.black{
width:40px;
height:180px;
background:black;
position:absolute;
right:-20px;
top:0;
z-index:2;
}

.info{
position:fixed;
left:20px;
bottom:20px;
font-size:20px;
}
</style>
</head>
<body>

<div id="controls">

<button id="sustainBtn">Sustain OFF</button>

<button id="scrollBtn">🔒 Scroll</button>

<label>Seleccionar MIDI</label>
<select id="midiSelect">
<option>Cargando biblioteca...</option>
</select>

<button id="playBtn">▶ Reproducir</button>
<button id="pauseBtn">⏸ Pausar</button>
<button id="resumeBtn">⏭ Continuar</button>

<button onclick="location.href='menu.html'">← Volver</button>

</div>

<div class="info">
Desarrollado por JFAM & Co. Piano Studio
</div>

<div id="keyboard"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getStorage,
ref,
listAll,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyArKUqthRHDrO1xXn39wJP-JCiBZdilOcY",
authDomain: "piano-deluxe-premium.firebaseapp.com",
projectId: "piano-deluxe-premium",
storageBucket: "piano-deluxe-premium.firebasestorage.app",
messagingSenderId: "79307845171",
appId: "1:79307845171:web:c21918694f6d916fbbfd46"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

const midiSelect = document.getElementById("midiSelect");

async function cargarBibliotecaGlobal(){
try{
const folderRef = ref(storage, "midis/");
const files = await listAll(folderRef);

midiSelect.innerHTML = "";

if(files.items.length === 0){
midiSelect.innerHTML = <option&gt;No hay MIDIs&lt;/option>;
return;
}

for(const file of files.items){
const url = await getDownloadURL(file);

const option = document.createElement("option");
option.value = url;
option.textContent = file.name.replace(".mid","");

midiSelect.appendChild(option);
}

}catch(error){
console.error(error);
}
}

cargarBibliotecaGlobal();

const keyboard = document.getElementById("keyboard");

const notes = [
"C3","D3","E3","F3","G3","A3","B3",
"C4","D4","E4","F4","G4","A4","B4",
"C5","D5","E5","F5","G5","A5","B5"
];

notes.forEach(note=>{
const key = document.createElement("div");
key.className="key";
key.dataset.note=note;
keyboard.appendChild(key);
});

let currentMidi = null;
let currentIndex = 0;
let isPaused = false;

async function playMidi(){
const url = midiSelect.value;

if(!url){
alert("Selecciona un MIDI");
return;
}

const response = await fetch(url);
const arrayBuffer = await response.arrayBuffer();

currentMidi = new Midi(arrayBuffer);
currentIndex = 0;
isPaused = false;

reproducirNotas();
}

function reproducirNotas(){
if(!currentMidi) return;

const notes = currentMidi.tracks[0].notes;

function next(){
if(isPaused) return;
if(currentIndex >= notes.length) return;

const note = notes[currentIndex];
console.log("Nota:", note.name);

currentIndex++;

setTimeout(next, note.duration * 500);
}

next();
}

document.getElementById("playBtn").onclick = playMidi;

document.getElementById("pauseBtn").onclick = ()=>{
isPaused = true;
};

document.getElementById("resumeBtn").onclick = ()=>{
isPaused = false;
reproducirNotas();
};

let sustain = false;
document.getElementById("sustainBtn").onclick = ()=>{
sustain = !sustain;
document.getElementById("sustainBtn").textContent =
sustain ? "Sustain ON" : "Sustain OFF";
};

let scrollLock = true;
document.getElementById("scrollBtn").onclick = ()=>{
scrollLock = !scrollLock;
document.getElementById("scrollBtn").textContent =
scrollLock ? "🔒 Scroll" : "🔓 Scroll";
};
</script>

</body>
</html>
