<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Deluxe Premium</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
</head>
<body>

<div class="top-bar">
  <button id="sustainBtn">Sustain OFF</button>
  <button id="scrollBtn">🔒 Scroll</button>
</div>

<div class="info">
  Desarrollado por JFAM & Co. Piano Studio
</div>

<div id="keyboard"></div>

<script>
const keyboard = document.getElementById("keyboard");
const notes = ["C","D","E","F","G","A","B"];
let sustain = false;

const synth = new Tone.PolySynth(Tone.Synth).toDestination();

document.getElementById("sustainBtn").onclick = () => {
    sustain = !sustain;
    document.getElementById("sustainBtn").textContent =
        sustain ? "Sustain ON" : "Sustain OFF";
};

document.getElementById("scrollBtn").onclick = () => {
    if(document.body.style.overflow === "hidden"){
        document.body.style.overflow = "auto";
    } else {
        document.body.style.overflow = "hidden";
    }
};

for(let octave = 3; octave <= 5; octave++){
    notes.forEach(note=>{
        const key = document.createElement("div");
        key.className = "white-key";
        key.innerText = note + octave;

        key.addEventListener("touchstart", () => {
            synth.triggerAttack(note + octave);
        });

        key.addEventListener("touchend", () => {
            if(!sustain){
                synth.triggerRelease(note + octave);
            }
        });

        key.addEventListener("mousedown", () => {
            synth.triggerAttack(note + octave);
        });

        key.addEventListener("mouseup", () => {
            if(!sustain){
                synth.triggerRelease(note + octave);
            }
        });

        keyboard.appendChild(key);
    });
}
</script>

</body>
</html>
