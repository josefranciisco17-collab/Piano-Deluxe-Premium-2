<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Piano Deluxe Premium</title>

<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
<link rel="stylesheet" href="style.css">

<style>
#listaMidis{
margin:20px;
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
}

#listaMidis button{
padding:10px;
border:none;
border-radius:8px;
background:#222;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<h2>Piano Deluxe Premium</h2>

<div style="margin-bottom:14px;font-size:14px;color:#d0d0d0">
Desarrollado por JFAM & Co. Piano Studio
</div>

<div class="controls">

<button id="pedal">
Sustain OFF
</button>

<button id="lockBtn">
🔓 Scroll
</button>

<label for="midiFile">
Seleccionar MIDI
</label>

<input type="file" id="midiFile" accept=".mid,.midi">

<button id="playMidi">
▶ Reproducir
</button>

<button id="pauseMidi">
⏸ Pausar
</button>

<button id="continueMidi">
⏩ Continuar
</button>

<button onclick="location.href='menu.html'">
⬅ Volver
</button>

</div>

<div class="piano-container" id="container">
<div class="piano-keyboard" id="keyboard"></div>
</div>

<h2>Biblioteca Global</h2>
<div id="listaMidis"></div>

<script type="module">

import { db } from "./firebase-config.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const AudioContextClass =
window.AudioContext ||
window.webkitAudioContext;

let audioCtx;
let sustain = false;
let locked = false;
const cache = {};
let midiData = null;
let midiTimeouts = [];
let paused = false;
let pauseTime = 0;
let startTime = 0;

function initAudio(){
if(!audioCtx)
audioCtx = new AudioContextClass();
}

document.getElementById("pedal").onclick=()=>{
sustain=!sustain;
document.getElementById("pedal").textContent=
"Sustain "+(sustain?"ON":"OFF");
};

document.getElementById("lockBtn").onclick=()=>{
locked=!locked;
document.getElementById("container").style.overflowX=
locked?"hidden":"auto";

document.getElementById("lockBtn").textContent=
locked?"🔒 Lock":"🔓 Scroll";
};

const SAMPLE_NOTES=[
"A0","C1","Ds1","Fs1","A1","C2","Ds2","Fs2","A2",
"C3","Ds3","Fs3","A3","C4","Ds4","Fs4","A4",
"C5","Ds5","Fs5","A5","C6","Ds6","Fs6","A6",
"C7","Ds7","Fs7","A7","C8"
];

function noteToMidi(name){
const map={
C:0,Cs:1,D:2,Ds:3,E:4,
F:5,Fs:6,G:7,Gs:8,A:9,
As:10,B:11
};

const m=name.match(/^([A-G]s?)(\d)$`/);

return (parseInt(m[2])+1)*12+
map[m[1]];
}

function getBestSample(noteId){
const midi=noteId+21;

let best=SAMPLE_NOTES[0];
let diff=999;

for(const s of SAMPLE_NOTES){
const d=Math.abs(midi-noteToMidi(s));

if(d<diff){
diff=d;
best=s;
}
}

const semitones=
midi-noteToMidi(best);

return {
file:audio/${best}v8.mp3`,
rate:Math.pow(2,semitones/12)
};
}

async function loadSample(file){
if(cache[file]) return cache[file];

const r=await fetch(file);
const b=await r.arrayBuffer();
const a=await audioCtx.decodeAudioData(b);

cache[file]=a;
return a;
}

async function playNote(noteId){
initAudio();

const s=getBestSample(noteId);
const buffer=await loadSample(s.file);

const src=audioCtx.createBufferSource();
src.buffer=buffer;
src.playbackRate.value=s.rate;

const gain=audioCtx.createGain();
gain.gain.value=1.0;

src.connect(gain);
gain.connect(audioCtx.destination);

src.start();

if(!sustain){
gain.gain.exponentialRampToValueAtTime(
0.001,
audioCtx.currentTime+1.5
);

src.stop(audioCtx.currentTime+1.6);
}
}

const names=[
"Do","Do#","Re","Re#",
"Mi","Fa","Fa#","Sol",
"Sol#","La","La#","Si"
];

const keyboard=document.getElementById("keyboard");

let white=0;

for(let i=0;i<88;i++){

const note=(i+9)%12;
const oct=Math.floor((i+9)/12);
const black=names[note].includes("#");

const key=document.createElement("div");

key.className="key"+(black?" black":"");
key.dataset.note=i;

const label=document.createElement("span");

label.className="label";
label.textContent=names[note]+oct;

key.appendChild(label);

if(black){
key.style.left=(white*38)+"px";
}else{
white++;
}

key.addEventListener("pointerdown",async()=>{
key.classList.add("active");

playNote(i);

setTimeout(()=>{
key.classList.remove("active");
},120);
});

keyboard.appendChild(key);
}

document
.getElementById("midiFile")
.addEventListener("change",async(e)=>{

const file=e.target.files[0];

if(!file)return;

const buffer=await file.arrayBuffer();

midiData=new Midi(buffer);

alert("MIDI cargado");
});

function clearMidi(){
midiTimeouts.forEach(t=>clearTimeout(t));
midiTimeouts=[];
}

function scheduleMidi(offset=0){
if(!midiData)return;

startTime=Date.now()-offset*1000;

midiData.tracks.forEach(track=>{
track.notes.forEach(n=>{

if(n.time<offset)return;

const noteId=n.midi-21;

const timeout=setTimeout(()=>{

const key=document.querySelector(
'[data-note="'+noteId+'"]'
);

if(key){
key.classList.add("active");

playNote(noteId);

setTimeout(()=>{
key.classList.remove("active");
},n.duration*1000);
}

},(n.time-offset)*1000);

midiTimeouts.push(timeout);

});
});
}

document.getElementById("playMidi").onclick=()=>{
if(!midiData){
alert("Selecciona un MIDI");
return;
}

clearMidi();
pauseTime=0;
scheduleMidi(0);
paused=false;
};

document.getElementById("pauseMidi").onclick=()=>{
clearMidi();
pauseTime=(Date.now()-startTime)/1000;
paused=true;
};

document.getElementById("continueMidi").onclick=()=>{
if(!paused)return;

clearMidi();
scheduleMidi(pauseTime);
paused=false;
};

async function cargarMidis(){

const lista=document.getElementById("listaMidis");

lista.innerHTML="";

const snapshot=await getDocs(collection(db,"midis"));

snapshot.forEach(doc=>{

const midi=doc.data();

lista.innerHTML+=&lt;button onclick="reproducirMidi('${midi.url}')">
▶ ${midi.nombre} &lt;/button&gt;;

});
}

window.reproducirMidi = async function(url){

clearMidi();

const response=await fetch(url);
const arrayBuffer=await response.arrayBuffer();

midiData=new Midi(arrayBuffer);

pauseTime=0;
paused=false;

scheduleMidi(0);

alert("Reproduciendo MIDI desde biblioteca");

};

cargarMidis();

</script>

</body>
</html>
