<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Piano Deluxe Yamaha Premium</title>

<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>

<style>
body{
margin:0;
padding:15px;
background:#121212;
color:#fff;
font-family:Segoe UI;
text-align:center;
overflow-y:auto;
overflow-x:hidden;
}

.controls{
margin:10px;
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
}

button,label{
padding:10px 16px;
border-radius:22px;
background:#1f1f1f;
color:#fff;
border:1px solid #444;
cursor:pointer;
font-weight:bold;
font-size:13px;
}

input[type=file]{
display:none;
}

.piano-container{
overflow-x:auto;
overflow-y:hidden;
background:#0a0a0a;
padding:10px;
border-radius:10px;
}

.piano-keyboard{
display:flex;
position:relative;
width:max-content;
}

.key{
width:38px;
height:210px;
background:linear-gradient(#fff,#eee,#ccc);
border-left:2px solid #000;
border-right:2px solid #000;
border-bottom:2px solid #000;
position:relative;
border-radius:0 0 8px 8px;
}

.black{
position:absolute;
width:24px;
height:130px;
background:black;
z-index:2;
margin-left:-12px;
}

.label{
position:absolute;
bottom:5px;
left:50%;
transform:translateX(-50%);
font-size:8px;
}
</style>
</head>

<body>

<h2>Piano Deluxe</h2>

<div>Desarrollado por JFAM & Co. Piano Studio</div>

<div class="controls">

<button id="pedal">Sustain OFF</button>

<button id="lockBtn">🔓 Scroll</button>

<label for="midiFile">Seleccionar MIDI</label>
<input type="file" id="midiFile" accept=".mid,.midi">

</div>

<div class="piano-container" id="container">
<div class="piano-keyboard" id="keyboard"></div>
</div>

<script>
const names=["Do","Do#","Re","Re#","Mi","Fa","Fa#","Sol","Sol#","La","La#","Si"];

const keyboard=document.getElementById("keyboard");

let white=0;

for(let i=0;i<88;i++){

const note=(i+9)%12;
const oct=Math.floor((i+9)/12);
const black=names[note].includes("#");

const key=document.createElement("div");
key.className="key"+(black?" black":"");

const label=document.createElement("span");
label.className="label";
label.textContent=names[note]+oct;

key.appendChild(label);

if(black){
key.style.left=(white*38)+"px";
}else{
white++;
}

keyboard.appendChild(key);
}

document.getElementById("midiFile").addEventListener("change",async(e)=>{
const file=e.target.files[0];
if(!file)return;

const buffer=await file.arrayBuffer();

const midi=new Midi(buffer);

console.log(midi);

alert("MIDI cargado");
});
</script>

</body>
</html>
